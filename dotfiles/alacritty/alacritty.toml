[window]
decorations="full"
opacity = 0.9

[[keyboard.bindings]]
key = "F"
mods = "Alt"
mode = "~Vi"
action = "ToggleViMode"

[[keyboard.bindings]]
key = "Enter"
mode = "Vi|~Search"
action = "Copy"

[[keyboard.bindings]]
key = "Enter"
mode = "Vi|~Search"
action = "ClearSelection"

[[keyboard.bindings]]
key = "Enter"
mode = "Vi|~Search"
action = "ToggleViMode"

[colors.primary]
background = "#010101"
foreground = "#f8f8f2"

[colors.normal]
black   = "#282c34"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#f8f8f2"

[colors.bright]
black   = "#545c6e"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#d6acff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"

